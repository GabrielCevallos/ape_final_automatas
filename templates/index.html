    <script>
        // ============================================================
        //  SISTEMA DE NOTIFICACIONES (TOAST)
        // ============================================================
        const Toast = {
            container: document.getElementById('toastContainer'),

            show({ title, message, type = 'info', duration = 4000 }) {
                const icons = {
                    warning: 'fa-exclamation-triangle',
                    error: 'fa-times-circle',
                    success: 'fa-check-circle',
                    info: 'fa-info-circle'
                };

                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `
                    <div class="toast-icon ${type}">
                        <i class="fas ${icons[type] || icons.info}"></i>
                    </div>
                    <div class="toast-content">
                        <div class="toast-title">${title}</div>
                        <div class="toast-message">${message}</div>
                    </div>
                    <button class="toast-close" onclick="this.closest('.toast').remove()">
                        <i class="fas fa-times"></i>
                    </button>
                `;

                this.container.appendChild(toast);

                // Auto dismiss
                if (duration > 0) {
                    setTimeout(() => {
                        toast.classList.add('hiding');
                        setTimeout(() => toast.remove(), 300);
                    }, duration);
                }

                // Click to dismiss
                toast.addEventListener('click', (e) => {
                    if (e.target.closest('.toast-close')) return;
                    toast.classList.add('hiding');
                    setTimeout(() => toast.remove(), 300);
                });

                return toast;
            },

            warning(title, message, duration = 4000) {
                return this.show({ title, message, type: 'warning', duration });
            },

            error(title, message, duration = 5000) {
                return this.show({ title, message, type: 'error', duration });
            },

            success(title, message, duration = 3000) {
                return this.show({ title, message, type: 'success', duration });
            },

            info(title, message, duration = 4000) {
                return this.show({ title, message, type: 'info', duration });
            }
        };

        //  ANÁLISIS PRINCIPAL
        // ============================================================
        async function analizarOraciones(modo) {
            const input = document.getElementById('oraciones-input').value.trim();
            if (!input) {
                Toast.warning('Campo vacío', 'Ingresa al menos una oración para analizar.');
                return;
            }

            const oraciones = input.split('\n').filter(o => o.trim());

            // Mostrar loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultados-container').innerHTML = '';

            try {
                const resp = await fetch('/analizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oraciones, modo })
                });

                // Si la respuesta no es JSON, probablemente hay error HTML
                const contentType = resp.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await resp.text();
                    console.error('Respuesta no JSON:', text.substring(0, 200));
                    throw new Error('El servidor devolvió una respuesta inválida. Verifica que el modelo spaCy esté instalado.');
                }

                const data = await resp.json();
                document.getElementById('loading').classList.remove('show');

                if (data.error) {
                    Toast.error('Error del servidor', data.error);
                    return;
                }

                if (data.resultados) {
                    Toast.success('Análisis completado', `Se procesaron ${data.resultados.length} oraciones`);
                    mostrarResultados(data.resultados);
                } else {
                    Toast.warning('Sin resultados', 'No se obtuvieron datos del análisis');
                }

            } catch (err) {
                document.getElementById('loading').classList.remove('show');
                console.error('Error:', err);
                Toast.error('Error de conexión', err.message || 'No se pudo conectar con el servidor');
            }
        }

        function makeTable(tokens) {
            if (!tokens || tokens.length === 0) {
                return '<p style="color:#94a3b8; padding: 12px 0;">No hay tokens disponibles</p>';
            }
            return `<table>
                <thead><tr><th>Token</th><th>Lema</th><th>POS</th><th>Dependencia</th><th>Cabeza</th></tr></thead>
                <tbody>${tokens.map(t => `<tr>
                    <td><strong>${t.text || '—'}</strong></td>
                    <td><span class="tag tag-lem">${t.lemma || '—'}</span></td>
                    <td><span class="tag tag-pos">${t.pos || '—'}</span></td>
                    <td><span class="tag tag-dep">${t.dep || '—'}</span></td>
                    <td>${t.head || '—'}</td>
                </tr>`).join('')}</tbody></table>`;
        }

        function makeCompTable(r) {
            const sp = r.spacy || { tiempo: 0, memoria: 0 };
            const st = r.stanza || { tiempo: 0, memoria: 0 };
            const cmp = r.comparacion || { precision_pos: 0, precision_dep: 0 };
            return `<table class="cmp-table">
                <thead><tr><th>Aspecto</th><th>spaCy</th><th>Stanza (Stanford)</th></tr></thead>
                <tbody>
                    <tr><td>Tiempo ejecución</td><td>${sp.tiempo || '—'} ms</td><td>${st.tiempo || '—'} ms</td></tr>
                    <tr><td>Precisión POS</td><td colspan="2" style="text-align:center">${cmp.precision_pos || '—'}%</td></tr>
                    <tr><td>Dependencias</td><td colspan="2" style="text-align:center">${cmp.precision_dep || '—'}%</td></tr>
                    <tr><td>Memoria</td><td>${sp.memoria || '—'} MB</td><td>${st.memoria || '—'} MB</td></tr>
                </tbody></table>`;
        }

        let _arbolCounter = 0;
        function buildArbol(tokens) {
            if (!tokens || tokens.length === 0) return '';
            const uid = 'arb' + (_arbolCounter++);

            const POS_COLORS = {
                'VERB': '#e94560', 'AUX': '#e94560',
                'NOUN': '#0f9b8e', 'PROPN': '#0f9b8e',
                'ADJ': '#f39c12', 'ADV': '#9b59b6',
                'ADP': '#555', 'CONJ': '#555', 'CCONJ': '#555', 'SCONJ': '#555',
                'DET': '#7f8c8d', 'PRON': '#3498db', 'PUNCT': '#bbb',
                'NUM': '#e67e22', 'SYM': '#bbb', 'X': '#95a5a6',
            };
            const posColor = (p) => POS_COLORS[p] || '#95a5a6';

            const nameMap = {};
            tokens.forEach((t, i) => {
                (nameMap[t.text] || (nameMap[t.text] = [])).push(i);
            });

            const headOf = tokens.map((t, i) => {
                if (!t.head || t.head === t.text) return -1;
                const cands = nameMap[t.head];
                if (!cands) return -1;
                for (const c of cands) if (c < i) return c;
                return cands[0];
            });

            let root = headOf.findIndex((h, i) => h === -1 || tokens[i].dep === 'root');
            if (root === -1) root = 0;

            const ch = tokens.map(() => []);
            headOf.forEach((h, i) => { if (i !== root && h >= 0) ch[h].push(i); });

            const leaves = (i) => ch[i].length === 0 ? 1 : ch[i].reduce((s, c) => s + leaves(c), 0);
            const totalLeaves = leaves(root);

            const HS = 100, VS = 85;
            const pos = new Map();
            let lx = 0;

            function layout(i, d) {
                if (ch[i].length === 0) {
                    const x = lx * HS;
                    lx++;
                    pos.set(i, { x, y: d * VS });
                    return [x, x];
                }
                const ranges = ch[i].map(c => layout(c, d + 1));
                const lo = Math.min(...ranges.map(r => r[0]));
                const hi = Math.max(...ranges.map(r => r[1]));
                pos.set(i, { x: (lo + hi) / 2, y: d * VS });
                return [lo, hi];
            }
            layout(root, 0);

            // Bounding box
            let bx0 = Infinity, bx1 = -Infinity, by0 = Infinity, by1 = -Infinity;
            tokens.forEach((t, i) => {
                const p = pos.get(i);
                const hw = t.text.length * 5 + 14;
                bx0 = Math.min(bx0, p.x - hw);
                bx1 = Math.max(bx1, p.x + hw);
                by0 = Math.min(by0, p.y - 14);
                by1 = Math.max(by1, p.y + 30);
            });
            const P = 18;
            const vx = bx0 - P, vy = by0 - P, vw = bx1 - bx0 + P * 2, vh = by1 - by0 + P * 2;

            let s = `<svg viewBox="${vx} ${vy} ${vw} ${vh}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="font-family:'Segoe UI',Tahoma,sans-serif">`;
            s += `<defs><filter id="${uid}" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0.5" dy="1.5" stdDeviation="1.5" flood-opacity=".18"/></filter></defs>`;

            headOf.forEach((h, i) => {
                if (i === root || h < 0) return;
                const fp = pos.get(h), tp = pos.get(i);
                const mx = (fp.x + tp.x) / 2, my = (fp.y + tp.y) / 2;
                s += `<path d="M${fp.x},${fp.y+14} C${fp.x},${my} ${tp.x},${my} ${tp.x},${tp.y-14}" stroke="#c0c0c0" stroke-width="2" fill="none"/>`;
                const lab = tokens[i].dep, lw = lab.length * 6 + 8;
                s += `<rect x="${mx-lw/2}" y="${my-7}" width="${lw}" height="14" rx="3" fill="#fff" stroke="#ddd" stroke-width=".7"/>`;
                s += `<text x="${mx}" y="${my+3}" text-anchor="middle" font-size="9" fill="#888" font-weight="600">${lab}</text>`;
            });

            tokens.forEach((t, i) => {
                const p = pos.get(i), c = posColor(t.pos);
                const pw = Math.max(t.text.length * 7.5 + 12, 40);
                s += `<rect x="${p.x-pw/2}" y="${p.y-12}" width="${pw}" height="24" rx="12" fill="${c}" filter="url(#${uid})"/>`;
                s += `<text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">${t.text}</text>`;
                s += `<text x="${p.x}" y="${p.y+24}" text-anchor="middle" font-size="8" fill="${c}" font-weight="700">${t.pos}</text>`;
            });

            s += '</svg>';
            return s;
        }

        function showTab(idx, tab) {
            const parent = document.getElementById(`tabs-${idx}`).parentElement;
            parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            parent.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const btns = parent.querySelectorAll('.tab');
            btns.forEach(b => {
                if (b.textContent.toLowerCase().includes(tab)) b.classList.add('active');
            });
            document.getElementById(`tab-${tab}-${idx}`).classList.add('active');
        }

        // Event delegation for tabs
        document.addEventListener('click', function(e) {
            const tabBtn = e.target.closest('.tab');
            if (tabBtn) {
                const parent = tabBtn.closest('.tabs');
                if (!parent) return;
                const idx = parent.id.replace('tabs-', '');
                const tabMap = {
                    'spacy': 'spacy',
                    'stanza': 'stanza',
                    'comparación': 'compare',
                    'árbol': 'arbol'
                };
                const txt = tabBtn.textContent.trim().toLowerCase();
                const tabKey = tabMap[txt] || txt;
                showTab(parseInt(idx), tabKey);
                e.preventDefault();
            }
        });
